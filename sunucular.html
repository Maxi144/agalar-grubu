<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGALAR | Sunucu Adresleri</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
body{background-color:#0b0f19;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;position:relative;}
.kavax-header{position:fixed;top:0;left:0;width:100%;height:80px;z-index:50;border-bottom:1px solid rgba(255,255,255,0.05);background-color:rgba(0,0,0,0.5);backdrop-filter:blur(12px);}
.kavax-container{max-width:1280px;margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:space-between;}
.logo-alani{font-size:24px;font-weight:bold;letter-spacing:0.05em;color:#ffffff;}
.menu-linkleri{display:flex;align-items:center;gap:32px;}
.menu-linkleri a{font-size:14px;font-weight:500;color:#9ca3af;text-decoration:none;}
.admin-link-butonu{background-color:#9333ea !important;color:#ffffff !important;padding:6px 14px;border-radius:6px;font-weight:700 !important;box-shadow:0 0 15px rgba(147, 51, 234, 0.4);}
.giris-butonu{display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 24px;border-radius:6px;background-color:#ffffff;color:#000000;font-size:14px;font-weight:500;text-decoration:none;}
.icerik-alani{margin-top:80px;padding:40px 24px;flex:1;display:flex;flex-direction:column;align-items:center;filter:blur(15px);pointer-events:none;user-select:none;}
.sayfa-basligi{color:#ffffff;font-size:32px;font-weight:700;margin-bottom:30px;}
.sunucu-tablosu{width:100%;max-width:1100px;border-collapse:collapse;background-color:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:8px;overflow:hidden;}
.sunucu-tablosu th{background-color:rgba(255,255,255,0.05);color:#ffffff;text-align:left;padding:16px;font-size:15px;font-weight:600;}
.sunucu-tablosu td{padding:16px;color:#9ca3af;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.05);}
.oturum-katmani{position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100;}
.oturum-paneli{background-color:#111827;border:1px solid rgba(255,255,255,0.08);width:100%;max-width:400px;padding:40px;border-radius:12px;text-align:center;}
.panel-baslik{color:#ffffff;font-size:24px;font-weight:700;margin-bottom:8px;}
.panel-alt-yazi{color:#6b7280;font-size:14px;margin-bottom:24px;}
.girdi-kutusu{width:100%;height:44px;background-color:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:0 16px;color:#ffffff;font-size:14px;margin-bottom:16px;outline:none;}
.panel-buton{width:100%;height:44px;background-color:#ffffff;color:#000000;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;}
.kayit-link-alani{color:#9ca3af;font-size:13px;margin-top:16px;}
.kayit-link-alani a{color:#3b82f6;text-decoration:none;font-weight:600;}
</style>
</head>
<body>
<header class="kavax-header">
<div class="kavax-container">
<div class="logo-alani">AGALAR</div>
<nav class="menu-linkleri" id="nav-menu"><a href="https://github.io">Ana Sayfa</a><a href="chat.html">Chat</a></nav>
<a href="#" class="giris-butonu" id="durum-butonu">Kilitli</a>
</div>
</header>
<main class="icerik-alani" id="ana-icerik">
<h1 class="sayfa-basligi">Aktif Sunucu Adresleri</h1>
<table class="sunucu-tablosu">
<thead><tr><th>Sunucu İsmi</th><th>Sahibi</th><th>Sunucu Özellikleri</th><th>Adresi</th><th>Sürümü</th><th>Modlu mu?</th></tr></thead>
<tbody id="sunucu-tablo-body"></tbody>
</table>
</main>
<div class="oturum-katmani" id="giris-paneli">
<div class="oturum-paneli">
<h2 class="panel-baslik">Erişim Engellendi</h2>
<p class="panel-alt-yazi">Sunucu detaylarını görmek için onaylanmış hesabınla oturum açmalısın.</p>
<input type="text" id="kullanici-adi" class="girdi-kutusu" placeholder="Kullanıcı Adı"><input type="password" id="sifre" class="girdi-kutusu" placeholder="Şifre">
<button class="panel-buton" onclick="sistemeGirisYap()">Oturum Aç</button>
<div class="kayit-link-alani">Hesabın yok mu? <a href="https://google.com" target="_blank">Başvuru Yap</a></div>
</div>
</div>
<script>
var FIREBASE_URL = "https://firebasedatabase.app"; 

window.onload = function() { tabloyuDoldur(); var aktifRol = localStorage.getItem('aktif_oturum'); if (aktifRol) { paneliKapat(aktifRol); } }

function tabloyuDoldur() {
    var tbody = document.getElementById('sunucu-tablo-body'); tbody.innerHTML = "";
    fetch(FIREBASE_URL + "sunucular.json").then(res => res.json()).then(data => {
        if(!data) {
            tbody.innerHTML = '<tr><td>Agalar Survival</td><td>Kavax</td><td>64 GB RAM</td><td>://agalar.com</td><td>1.20.4</td><td>Hayır</td></tr>';
            return;
        }
        Object.keys(data).forEach(key => {
            var s = data[key]; var tr = document.createElement('tr');
            tr.innerHTML = '<td>'+s.isim+'</td><td>'+s.sahip+'</td><td>'+s.ozellik+'</td><td>'+s.adres+'</td><td>'+s.surum+'</td><td>'+s.mod+'</td>';
            tbody.appendChild(tr);
        });
    });
}

function paneliKapat(rol) {
document.getElementById('ana-icerik').style.filter = "none"; document.getElementById('ana-icerik').style.pointerEvents = "auto"; document.getElementById('ana-icerik').style.userSelect = "auto";
document.getElementById('giris-paneli').style.display = "none"; document.getElementById('durum-butonu').innerText = "Oturum Açık";
document.getElementById('durum-butonu').style.backgroundColor = "#22c55e"; document.getElementById('durum-butonu').style.color = "#ffffff";
if (rol === 'admin') {
var menu = document.getElementById('nav-menu');
if(!document.querySelector('.admin-link-butonu')){
var adminButon = document.createElement('a'); adminButon.href = "admin.html"; adminButon.innerText = "Admin Paneli"; adminButon.className = "admin-link-butonu"; menu.appendChild(adminButon);
}
}
}

function sistemeGirisYap() {
    var kadi = document.getElementById('kullanici-adi').value.trim(); 
    var pas = document.getElementById('sifre').value.trim();
    if(kadi === "admin" && pas === "admin123") { localStorage.setItem('aktif_oturum', 'admin'); paneliKapat('admin'); return; }

    fetch(FIREBASE_URL + "kullanicilar/" + kadi + ".json").then(res => res.json()).then(user => {
        if(user && user.sifre === pas) {
            localStorage.setItem('aktif_oturum', user.rutbe || 'uye');
            paneliKapat(user.rutbe || 'uye');
        } else { alert("Hatalı Kullanıcı Adı veya Şifre!"); }
    });
}
</script>
</body>
</html>
